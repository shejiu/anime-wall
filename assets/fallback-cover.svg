<svg xmlns="http://www.w3.org/2000/svg" width="600" height="840" viewBox="0 0 600 840">
  <defs>
    <!-- 深蓝紫渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08081a"/>
      <stop offset="35%" style="stop-color:#0e0c2a"/>
      <stop offset="70%" style="stop-color:#120e35"/>
      <stop offset="100%" style="stop-color:#0a0818"/>
    </linearGradient>
    <!-- 霓虹发光 -->
    <filter id="neonP">
      <feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonB">
      <feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 网格 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#b347ea" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <!-- 对角线 -->
    <pattern id="lines" width="12" height="12" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#ff2d95" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="840" fill="url(#bg)"/>
  <rect width="600" height="840" fill="url(#grid)"/>
  <rect width="600" height="840" fill="url(#lines)"/>

  <!-- 外框 -->
  <rect x="20" y="20" width="560" height="800" rx="20" fill="none" stroke="#ff2d95" stroke-width="1.2" opacity="0.25" stroke-dasharray="12 6"/>
  <rect x="26" y="26" width="548" height="788" rx="17" fill="none" stroke="#b347ea" stroke-width="0.8" opacity="0.15"/>

  <!-- 四角 -->
  <path d="M 40 40 L 100 40 M 40 40 L 40 100" fill="none" stroke="#ff2d95" stroke-width="2" opacity="0.35"/>
  <path d="M 560 40 L 500 40 M 560 40 L 560 100" fill="none" stroke="#ff2d95" stroke-width="2" opacity="0.35"/>
  <path d="M 40 800 L 100 800 M 40 800 L 40 740" fill="none" stroke="#b347ea" stroke-width="2" opacity="0.35"/>
  <path d="M 560 800 L 500 800 M 560 800 L 560 740" fill="none" stroke="#b347ea" stroke-width="2" opacity="0.35"/>

  <!-- 中央动漫角色剪影区 -->
  <circle cx="300" cy="300" r="80" fill="none" stroke="#b347ea" stroke-width="1" opacity="0.12"/>
  <circle cx="300" cy="300" r="65" fill="none" stroke="#ff2d95" stroke-width="0.6" opacity="0.08"/>

  <!-- 动漫脸 — 简笔画风格 -->
  <!-- 头部 -->
  <ellipse cx="300" cy="285" rx="35" ry="40" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.55"/>
  <!-- 眼睛 -->
  <ellipse cx="286" cy="278" rx="9" ry="11" fill="none" stroke="#00e5ff" stroke-width="2.2" opacity="0.7"/>
  <ellipse cx="314" cy="278" rx="9" ry="11" fill="none" stroke="#00e5ff" stroke-width="2.2" opacity="0.7"/>
  <circle cx="286" cy="278" r="3.5" fill="#00e5ff" opacity="0.8"/>
  <circle cx="314" cy="278" r="3.5" fill="#00e5ff" opacity="0.8"/>
  <!-- 眉毛 -->
  <line x1="275" y1="263" x2="293" y2="266" stroke="#ff2d95" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="325" y1="263" x2="307" y2="266" stroke="#ff2d95" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- 嘴巴：小小的不安表情 -->
  <path d="M 293 300 Q 300 306 307 300" fill="none" stroke="#ff2d95" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- 汗滴 -->
  <ellipse cx="335" cy="265" rx="5" ry="7" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.35" transform="rotate(15 335 265)"/>

  <!-- NO COVER 标题 -->
  <text x="300" y="430" text-anchor="middle" fill="#ff2d95" font-size="28" font-weight="900" font-family="'Segoe UI','Microsoft YaHei',sans-serif" filter="url(#neonP)" letter-spacing="4">NO COVER</text>

  <!-- 下划线 -->
  <line x1="180" y1="450" x2="420" y2="450" stroke="#ff2d95" stroke-width="1.2" opacity="0.35"/>

  <!-- 日文副标题 -->
  <text x="300" y="480" text-anchor="middle" fill="#b347ea" font-size="14" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" filter="url(#neonB)" letter-spacing="6" opacity="0.6">カバーありません</text>

  <!-- 中文说明 -->
  <text x="300" y="515" text-anchor="middle" fill="#8a7fa0" font-size="13" font-family="'Microsoft YaHei',sans-serif">封面图片暂时不可用</text>
  <text x="300" y="540" text-anchor="middle" fill="#5a4f70" font-size="11" font-family="'Microsoft YaHei',sans-serif">请检查网络连接或刷新页面</text>

  <!-- 分隔装饰 -->
  <line x1="150" y1="570" x2="450" y2="570" stroke="#b347ea" stroke-width="0.4" opacity="0.12"/>

  <!-- 底部信息 -->
  <text x="300" y="600" text-anchor="middle" fill="#3a2f50" font-size="11" font-family="'Segoe UI',sans-serif" letter-spacing="8">ANIME WALL</text>
  <text x="300" y="625" text-anchor="middle" fill="#2a1f40" font-size="9" font-family="monospace" letter-spacing="3">404_COVER_NOT_FOUND</text>

  <!-- 装饰竖线 -->
  <line x1="75" y1="150" x2="75" y2="700" stroke="#b347ea" stroke-width="0.3" opacity="0.06"/>
  <line x1="525" y1="150" x2="525" y2="700" stroke="#b347ea" stroke-width="0.3" opacity="0.06"/>

  <!-- 微小星点 -->
  <circle cx="95" cy="200" r="1.2" fill="#00e5ff" opacity="0.2"/>
  <circle cx="505" cy="380" r="1" fill="#ff2d95" opacity="0.2"/>
  <circle cx="130" cy="650" r="1.5" fill="#b347ea" opacity="0.15"/>
  <circle cx="470" cy="180" r="1" fill="#ffd54f" opacity="0.15"/>
  <circle cx="90" cy="420" r="0.8" fill="#00e5ff" opacity="0.18"/>
  <circle cx="510" cy="550" r="1.2" fill="#ff2d95" opacity="0.12"/>
  <circle cx="150" cy="350" r="0.8" fill="#ffd54f" opacity="0.1"/>

  <!-- 角落代码装饰 -->
  <text x="60" y="760" fill="#1a1030" font-size="9" font-family="monospace">ERR_IMG_FAIL</text>
  <text x="460" y="760" fill="#1a1030" font-size="9" font-family="monospace">FALLBACK_V2</text>
</svg>
